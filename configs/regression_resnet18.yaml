seed: 42
device: auto

data:
  metadata_csv: data/processed/TNG-DM-XAI-v1/regression_metadata.csv
  root_dir: .
  target_column: halo_mass_log10
  image_mode: RGB
  image_size: 224

model:
  architecture: resnet18
  pretrained: false
  dropout: 0.1
  freeze_backbone: false

training:
  epochs: 20
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.0001
  loss: smooth_l1
  num_workers: 2

augmentation:
  horizontal_flip: true
  vertical_flip: true
  rotation_degrees: 15

output:
  output_dir: outputs/regression_resnet18
