seed: 42
device: auto

data:
  metadata_csv: outputs/smoke_test/regression_metadata.csv
  root_dir: .
  target_column: halo_mass_log10
  image_mode: RGB
  image_size: 64

model:
  architecture: resnet18
  pretrained: false
  dropout: 0.0
  freeze_backbone: false

training:
  epochs: 1
  batch_size: 4
  learning_rate: 0.0001
  weight_decay: 0.0001
  loss: smooth_l1
  num_workers: 0

augmentation:
  horizontal_flip: false
  vertical_flip: false
  rotation_degrees: 0

output:
  output_dir: outputs/smoke_test
